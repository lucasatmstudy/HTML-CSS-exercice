<form action="#" method="post">
    <fieldset>
    <legend>Info personnelles</legend>
    <label for="prenom">Prénom</label>
        <input type="text" placeholder="Ex: Jacques" id="premon" maxlength="20" minlength="2" autofocus><br>
    <label for="nom">Nom</label>
        <input type="text" placeholder="Ex: Dubois" id="nom" maxlength="20" minlength="2"><br>
    <label for="email">Email</label>
        <input type="email" placeholder="Ex: monMail@FAI.com" id="email"><br>
    <label for="numero">Numéro</label>
        <input type="tel" placeholder="Ex: 0123456789" id="numero" maxlength="10" minlength="10"><br>
    <label for="password">Mot de passe</label>
        <input type="password" placeholder="Ex: P@ssword" id="password" maxlength="30" minlength="8"><br>
    <label for="age">Age</label>
        <input type="number" placeholder="Ex: 15" id="number" maxlength="10" minlength="10"><br>
    <label for="commentaire">Laissez un commentaire</label><br>
        <textarea placeholder="J'adore ce que vous faites" id="commentaire" cols="70" rows="10"></textarea><br>
    <label for="date">Date de mon commentaire</label>
        <input type="date" id="date"><br>
    <label for="photo">Ma photo</label>
        <input type="file" id="photo" accept=".jng, .png, .gif" multiple><br>
    </fieldset>
    <fieldset>
        <legend>Vous préférez</legend>
        <input type="checkbox" checked id="html">
        <label for="html">Le HTML</label><br>
        <input type="checkbox" id="css">
        <label for="css">Le CSS</label><br>
        <input type="checkbox" id="javascript">
        <label for="javascript">Le JavaScript</label><br>
        <input type="checkbox" id="rien">
        <label for="rien">Ne rien faire</label><br>
    </fieldset>
    <fieldset>
        <legend>Vous vous levez</legend>
            <input type="radio" id="matin" name="lever" value="matin" checked><label for="matin">Le matin</label><br>
            <input type="radio" id="midi" name="lever" value="midi"><label for="matin">Le midi</label><br>
            <input type="radio" id="soir" name="lever" value="soir"><label for="matin">Le soir</label><br>
            <input type="radio" id="retard" name="lever" value="retard"><label for="matin">En retard !</label><br>
    </fieldset>
    <fieldset>
        <legend>Fin du formulaire</legend>
        <label for="list">Vous en avez assez</label>
        <select name="list" id="list">
            <optgroup label="Team Pas encore">
                <option value="#" selected>J'en veux plus</option>
                <option value="#">C'est super !</option>
            </optgroup>
            <optgroup label="Team Pas encore">
                <option value="#">J'en ai marre</option>
                <option value="#">Pitié !</option>
            </optgroup>
        </select><br>
        <button type="submit">Envoyer</button>
        <button type="reset">Reset</button>
    </fieldset>
</form>
