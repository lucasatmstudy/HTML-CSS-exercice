<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <form action="#" method="POST">
        <h1>Connexion</h1>
        <div class="champs" id="champsID">

        <div class="champs" id="champsmdp">
        <label for="mdp">Mot de passe:</label>
        <input type="mdp" placeholder="Mon mot de passe" id="mdp">
        </div>
        <div id="souvenir">
        <input type="checkbox" id="moi" checked>
        <label for="moi">Se souvenir de moi</label>
        </div>
        <div class="bouton">
        <button>Connexion</button>
        <button>Retour</button>
        </div>
    </form>
</body>
