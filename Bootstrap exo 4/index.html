<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap exo 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" defer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>

</head>
<body>
    <div class="container">
        <div class="row text-center">
            <div class="col-12 card">Premier niveau avec 12 colonnes
                <div class="row align-items-start">
                    <div class="col-8 card">Second niveau avec 8 colonnes
                        <div class="row justify-content-between align-items-start">
                            <div class="col-4 card">Troisième niveau avec 4 colonnes</div>
                            <div class="col-6 card">Troisième niveau avec 6 colonnes
                                <div class="row align-items-start justify-content-evenly">
                                    <div class="col-3 card">Quatrième niveau avec 3 colonnes</div>
                                    <div class="col-4 card">Quatrième niveau avec 5 colonnes</div>
                                </div>
                            </div>
                        </div>
                    </div>
                <div class="col-4 card">Second niveau avec 4 colonnes</div>
            </div>
        </div>
    </div>
</body>
</html>
