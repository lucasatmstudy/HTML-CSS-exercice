<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap exo 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" defer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>

</head>
<body>
    <div class="container card">
        <div class="row justify-content-start">
            <div class="col-4 card bg-danger text-center">colonne 1</div>
        </div>
        <div class="row justify-content-center">
            <div class="col-4 card bg-danger text-center">colonne 2</div>
        </div>
        <div class="row justify-content-end">
            <div class="col-4 card bg-danger text-center">colonne 3</div>
        </div>
    <div class="container">
        <div class="row card text-center">
            <div class="col-4 card bg-danger align-items-start">colonne 1</div>
            <div class="col-4 card bg-danger align-self-center">colonne 2</div>
            <div class="col-4 card bg-danger align-self-end">colonne 3</div>
        </div>
    </div>
</body>
</html>
